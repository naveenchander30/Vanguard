services:
  kismet:
    image: kismet/kismet:latest
    profiles: [full]
    network_mode: host
    privileged: true
    volumes:
      - kismet_data:/opt/kismet
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    network_mode: host
    environment:
      - DATABASE_URL=file:/data/spectrum.db
      - NODE_ENV=production
      - KISMET_URL=http://localhost:2501
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kismet_data:
  backend_data:
